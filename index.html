<!DOCTYPE html>
<html lang="en" style="width:100%;height:100%;background-color:black;">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0" />
		<meta name="description" content="Play minecraft 1.8 in your browser" />
		<meta name="keywords" content="eaglercraft, eaglercraftx, minecraft, 1.8, 1.8.8" />
		<title>Mirsacraft 1.8.8</title>
		<meta property="og:locale" content="en-US" />
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Mirsacraft 1.8.8" />
		<meta property="og:description" content="Play minecraft 1.8 in your browser" />
		<meta property="og:image" content="favicon.png" />
		<link type="image/png" rel="shortcut icon" href="favicon.png" />
		
		<style>
			#loading-overlay {
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: black;
				z-index: 9999;
				display: flex;
				flex-direction: column;
				justify-content: center;
				align-items: center;
				color: white;
				font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			}
			.progress-container {
				width: 300px;
				height: 12px;
				border: 1px solid #444;
				background: #111;
				border-radius: 6px;
				overflow: hidden;
				margin-top: 20px;
			}
			#progress-bar {
				width: 0%;
				height: 100%;
				background: #3fb950;
				transition: width 0.1s linear;
			}
			#status-text {
				margin-top: 15px;
				font-size: 14px;
				font-weight: bold;
			}
			#speed-text {
				margin-top: 5px;
				font-size: 12px;
				color: #888;
			}
			.logo {
				image-rendering: pixelated;
				width: 80px;
				height: 80px;
			}
		</style>

		<script type="text/javascript" src="bootstrap.js"></script>
		<script type="text/javascript">
			"use strict";

			// Función para descargar con progreso
			async function downloadWithProgress(url) {
				const response = await fetch(url);
				if (!response.ok) throw new Error("Error al conectar con el servidor");
				
				const reader = response.body.getReader();
				const contentLength = +response.headers.get('Content-Length');
				
				let receivedLength = 0;
				let chunks = [];
				let startTime = Date.now();

				while(true) {
					const {done, value} = await reader.read();
					if (done) break;

					chunks.push(value);
					receivedLength += value.length;

					// Calcular progreso y velocidad
					const duration = (Date.now() - startTime) / 1000;
					const speed = receivedLength / 1024 / (duration || 1); // KB/s
					
					if (contentLength) {
						const progress = (receivedLength / contentLength) * 100;
						document.getElementById('progress-bar').style.width = progress + "%";
						document.getElementById('status-text').innerText = `Descargando: ${Math.round(progress)}%`;
					} else {
						document.getElementById('status-text').innerText = `Descargando: ${(receivedLength / 1024 / 1024).toFixed(2)} MB`;
					}

					document.getElementById('speed-text').innerText = speed > 1024 
						? (speed / 1024).toFixed(2) + " MB/s" 
						: Math.round(speed) + " KB/s";
				}

				const blob = new Blob(chunks);
				return URL.createObjectURL(blob);
			}

			window.addEventListener("load", async function() {
				if(window.location.href.indexOf("file:") === 0) {
					alert("HTTP please, do not open this file locally, run a local HTTP server and load it via HTTP");
					return;
				}

				try {
					// 1. Iniciar la descarga del archivo pesado
					const assetsURL = await downloadWithProgress("assets.epw");
					
					// 2. Ocultar la barra al finalizar
					document.getElementById('loading-overlay').style.display = 'none';

					// 3. Configurar opciones originales de lanzamiento
					var relayId = Math.floor(Math.random() * 3);
					window.eaglercraftXOpts = {
						demoMode: false,
						container: "game_frame",
						assetsURI: assetsURL, // Usamos el Blob generado
						worldsDB: "worlds",
						servers: [],
						relays: [
							{ addr: "wss://relay.deev.is/", comment: "lax1dude relay #1", primary: relayId == 0 },
							{ addr: "wss://relay.lax1dude.net/", comment: "lax1dude relay #2", primary: relayId == 1 },
							{ addr: "wss://relay.shhnowisnottheti.me/", comment: "ayunami relay #1", primary: relayId == 2 }
						]
					};
					
					// Manejo de parámetro de servidor original
					var q = window.location.search;
					if((typeof q === "string") && q[0] === "?" && (typeof window.URLSearchParams !== "undefined")) {
						q = new window.URLSearchParams(q);
						var s = q.get("server");
						if(s) window.eaglercraftXOpts.joinServer = s;
					}
					
					// 4. Iniciar el motor del juego
					main();

				} catch (err) {
					document.getElementById('status-text').innerText = "Error crítico de descarga";
					document.getElementById('speed-text').innerText = err.message;
					console.error(err);
				}
			});
		</script>
	</head>
	<body style="margin:0px;width:100%;height:100%;overflow:hidden;background-color:black;" id="game_frame">
		
		<div id="loading-overlay">
			<img src="favicon.png" class="logo" alt="Logo">
			<div class="progress-container">
				<div id="progress-bar"></div>
			</div>
			<div id="status-text">Iniciando...</div>
			<div id="speed-text">0 KB/s</div>
		</div>

	</body>
</html>
